services:
  postgres:
    image: postgres:16-alpine
    container_name: nawala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nawala
      POSTGRES_PASSWORD: nawala_dev_password
      POSTGRES_DB: nawala
    ports:
      - "5432:5432"
    volumes:
      - nawala_pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nawala -d nawala"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: nawala-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula

volumes:
  nawala_pgdata:
